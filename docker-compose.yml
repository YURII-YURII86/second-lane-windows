services:
  universal-flex-agent:
    build: .
    container_name: universal-flex-agent
    env_file:
      - .env
    environment:
      WORKSPACE_ROOTS: /workspace
      STATE_DB_PATH: /app/data/agent.db
      ENABLED_PROVIDER_MANIFESTS: /app/app/providers
    ports:
      - "8787:8787"
    volumes:
      - ./data:/app/data
      - ./workspace:/workspace
    restart: unless-stopped
